#
# Site Settings
#
title: Eren Soylu
tagline: Personal Blog & Portfolio
description: >- # used by search engines
  A modern, elegant personal blog focused on software and design.

# The subpath of your site, e.g. /blog
baseurl: ""

# The base hostname & protocol for your site, e.g. http://localhost:4000
url: "https://erensoylu.com"

author:
  name: Eren Soylu
  twitter: erensoylu
  github: ernsoylu
  # fill in more social links as needed

#
# Theme Settings
#
remote_theme: cotes2020/jekyll-theme-chirpy

plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-theme-chirpy
  - jekyll-remote-theme

#
# Pagination
#
paginate: 10
paginate_path: "/page:num/"

#
# Markdown
#
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

#
# Exclude from processing
#
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .jekyll-cache
  - .sass-cache
  - .gemini
  - README.md
  - LICENSE
  - docs
