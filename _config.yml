title: Eren Soylu
description: Personal Blog & Portfolio
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://erensoylu.com" # the base hostname & protocol for your site
author: Eren Soylu

markdown: kramdown
# theme: minima # removed to use custom local layouts
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude from processing.
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - gemini-tmp/
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - plans/
