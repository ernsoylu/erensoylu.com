#
# Site Settings
#
title: Eren Soylu
tagline: Personal Blog & Portfolio
description: >- # used by search engines
  Control System Architect, Software Developer, Energy Systems Engineer
# The subpath of your site, e.g. /blog
baseurl: ""

# The base hostname & protocol for your site, e.g. http://localhost:4000
url: "https://erensoylu.com"

author:
  name: Eren Soylu
  github: ernsoylu

github:
  username: ernsoylu

#
# Theme Settings
#
theme: jekyll-theme-chirpy

# Simple or Elegant
# theme_mode: "" # [light|dark] - leave empty to follow system preference

lang: en
timezone: UTC

#
# Collections
#
collections:
  tabs:
    output: true
    sort_by: order

#
# Front Matter Defaults
#
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      toc: true
      comments: false

#
# Plugins
#
plugins:
  - jekyll-paginate
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-include-cache

#
# Pagination
#
paginate: 10
paginate_path: "/page:num/"

#
# Markdown
#
markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge

#
# Exclude from processing
#
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .jekyll-cache
  - .sass-cache
  - .gemini
  - .claude
  - README.md
  - LICENSE
  - docs
  - .github
  - _scripts

#
# Chirpy Settings
#
google_analytics:
  id: "" # fill in your GA id

disqus:
  shortname: "" # fill in your disqus shortname

#
# Last Modification Date for each post
#
lastmod:
  enabled: true
  ignore:
    - _posts/2026-04-18-welcome.md

#
# Avatar Settings
#
avatar: /assets/img/Eren_SOYLU.png
